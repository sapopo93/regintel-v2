# /etc/nginx/sites-available/regintelia.conf
# symlink to /etc/nginx/sites-enabled/regintelia.conf
#
# After placing this file, run:
#   sudo nginx -t && sudo systemctl reload nginx

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name regintelia.co.uk www.regintelia.co.uk;
    return 301 https://regintelia.co.uk$request_uri;
}

# ── www → apex redirect (HTTPS) ──────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.regintelia.co.uk;

    ssl_certificate     /etc/letsencrypt/live/regintelia.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regintelia.co.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://regintelia.co.uk$request_uri;
}

# ── Main site ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name regintelia.co.uk;

    ssl_certificate     /etc/letsencrypt/live/regintelia.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regintelia.co.uk/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── API proxy (port 3001) ────────────────────────────────────────────────
    location /v1/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running exports / Blue Ocean report generation
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Max upload size for evidence blobs
        client_max_body_size 50m;
    }

    # ── Clerk webhooks ───────────────────────────────────────────────────────
    location /api/webhooks/clerk {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js app (port 3000) ──────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
